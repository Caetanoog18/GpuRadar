services:
  postgres:
    image: postgres:17-alpine
    container_name: gpu-radar-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - gpu-radar-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: gpu-radar-backend
    restart: unless-stopped

    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      SERPAPI_KEY: ${SERPAPI_KEY}

    ports:
      - "8080:8080"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - gpu-radar-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: gpu-radar-frontend
    restart: unless-stopped

    ports:
      - "4200:80"

    depends_on:
      - backend

    networks:
      - gpu-radar-network

volumes:
  postgres_data:

networks:
  gpu-radar-network:
    driver: bridge