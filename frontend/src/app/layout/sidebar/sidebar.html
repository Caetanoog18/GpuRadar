<aside class="sidebar">
  <a
    class="brand"
    routerLink="/"
    (click)="clearSearch()"
    aria-label="Return to home page"
  >
    <div class="brand-icon">
      <mat-icon>radar</mat-icon>
    </div>

    <div>
      <strong>GPU Radar</strong>
      <span>GPU Price Tracker</span>
    </div>
  </a>

  <nav>
    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      <mat-icon>search</mat-icon>
      <span>Search GPUs</span>
    </a>

    <a
      routerLink="/history"
      routerLinkActive="active"
    >
      <mat-icon>history</mat-icon>
      <span>History</span>
    </a>

    <a
      routerLink="/favorites"
      routerLinkActive="active"
    >
      <mat-icon>favorite_border</mat-icon>
      <span>Favorites</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="project-info">
      <strong>Smart Price Tracking</strong>
      <small>Personal Project</small>
    </div>

    <button
      type="button"
      class="logout-button"
      aria-label="Sign out"
      title="Sign out"
      (click)="logout()"
    >
      <mat-icon>logout</mat-icon>
      <span>Sign out</span>
    </button>
  </div>
</aside>
