<article
  class="product-card"
  [class.best]="bestOffer"
>
  @if (bestOffer) {
    <span class="best-badge">
      <mat-icon>verified</mat-icon>
      <span>Best Offer</span>
    </span>
  }

  <div class="product-visual">
    @if (
      product.imageUrl &&
      !imageError()
      ) {
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        loading="lazy"
        referrerpolicy="no-referrer"
        (error)="onImageError()"
      >
    } @else {
      <div class="image-fallback">
        <mat-icon>memory</mat-icon>
        <span>Image unavailable</span>
      </div>
    }
  </div>

  <div class="product-content">
    <span class="store">
      {{ product.store }}
    </span>

    <h3>
      {{ product.name }}
    </h3>

    <strong class="price">
      {{
        product.price
          | currency:'BRL'
      }}
    </strong>

    @if (product.simulated) {
      <span class="simulated-badge">
        Simulated result
      </span>
    }

    <div class="actions">
      <button
        mat-flat-button
        type="button"
        class="favorite-button"
        [class.favorited]="favorited"
        [disabled]="favoriteLoading"
        [attr.aria-pressed]="favorited"
        [attr.aria-label]="
          favorited
            ? 'Remove from favorites'
            : 'Add to favorites'
        "
        [attr.title]="
          favorited
            ? 'Remove from favorites'
            : 'Add to favorites'
        "
        (click)="toggleFavorite()"
      >
        <span class="favorite-button-content">
          <mat-icon>
            {{
              favorited
                ? 'favorite'
                : 'favorite_border'
            }}
          </mat-icon>

          <span class="favorite-button-label">
            @if (favoriteLoading) {
              {{
                favorited
                  ? 'Saving...'
                  : 'Removing...'
              }}
            } @else {
              {{
                favorited
                  ? 'Saved to Favorites'
                  : 'Add to Favorites'
              }}
            }
          </span>

          @if (favoriteLoading) {
            <mat-spinner
              diameter="18"
            />
          }
        </span>
      </button>

      <button
        mat-button
        type="button"
        class="details-button"
        (click)="openProduct()"
      >
        <span class="details-button-content">
          <mat-icon>open_in_new</mat-icon>
          <span>View Product</span>
        </span>
      </button>
    </div>
  </div>
</article>
