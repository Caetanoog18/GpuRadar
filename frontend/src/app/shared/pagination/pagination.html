@if (totalPages > 1) {
  <nav
    class="pagination"
    aria-label="Pagination"
  >
    <button
      type="button"
      class="navigation-button"
      [disabled]="currentPage === 1"
      (click)="previous()"
      aria-label="Go to previous page"
    >
      <mat-icon>chevron_left</mat-icon>
      <span>Previous</span>
    </button>

    <div class="page-numbers">
      @for (item of pageItems; track $index) {
        @if (item === 'ellipsis') {
          <span
            class="ellipsis"
            aria-hidden="true"
          >
            …
          </span>
        } @else {
          <button
            type="button"
            class="page-button"
            [class.active]="item === currentPage"
            [attr.aria-current]="
              item === currentPage
                ? 'page'
                : null
            "
            [attr.aria-label]="
              'Go to page ' + item
            "
            (click)="goToPage(item)"
          >
            {{ item }}
          </button>
        }
      }
    </div>

    <button
      type="button"
      class="navigation-button"
      [disabled]="currentPage === totalPages"
      (click)="next()"
      aria-label="Go to next page"
    >
      <span>Next</span>
      <mat-icon>chevron_right</mat-icon>
    </button>
  </nav>
}
